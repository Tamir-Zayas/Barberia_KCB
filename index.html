<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCB - Kevin Castello Barber</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HERO SECTION (GOKU) -->
    <header class="hero">
        <h1>Kevin Castello Barber (KCB)</h1>
        <p class="hero-subtitle">Transforma tu estilo. Nivel Super Saiyajin.</p>
    </header>

    <!-- SEPARADOR (GOKU + VEGETA BLUE) -->
    <div class="separador">
        <img src="images/goku-vegeta-blue.jpg" alt="Goku y Vegeta Blue">
    </div>

    <!-- SERVICIOS (BROLY) -->
    <section class="servicios">
        <h2 class="titulo-seccion">Servicios</h2>

        <div class="servicios-grid">

            <div class="servicio-card">
                <h3>Fade</h3>
                <p>Corte moderno con estilo limpio y definido.</p>
            </div>

            <div class="servicio-card">
                <h3>Barba</h3>
                <p>Diseño y perfilado profesional.</p>
            </div>

            <div class="servicio-card">
                <h3>Color</h3>
                <p>Transformación total estilo Super Saiyajin.</p>
            </div>

        </div>
    </section>

    <!-- SEPARADOR (GOKU + VEGETA BLUE) -->
    <div class="separador">
        <img src="images/goku-vegeta-blue.jpg" alt="Goku y Vegeta Blue">
    </div>

</body>
</html>
